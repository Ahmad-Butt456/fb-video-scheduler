name: Facebook Auto Video Poster Cron Job

on:
  schedule:
    # Pakistan Time ke mutabiq har ghante (on the hour) chalega
    - cron: '0 * * * *'
  workflow_dispatch: # Manual test button

jobs:
  post-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Google and Facebook Dependencies
        run: |
          pip install -r requirements.txt

      - name: Execute Auto Poster Script
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python poster.py
