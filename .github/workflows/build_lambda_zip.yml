name: Build AWS Lambda ZIP Package

on:
  push:
    branches:
      - main
    paths:
      - 'lambda_function.py'
      - 'requirements.txt'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create Package Directory and Install Dependencies
        run: |
          mkdir -p lambda_package
          # Install AWS Lambda-compatible binary wheels directly
          pip install -r requirements.txt -t lambda_package/ --platform manylinux2014_x86_64 --only-binary=:all: --implementation cp --python-version 3.12
          # Copy the lambda code into the package
          cp lambda_function.py lambda_package/

      - name: Upload Lambda Package as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-deployment-package
          path: lambda_package/
          retention-days: 7
